name: HealthLens Doctor

on:
  workflow_dispatch:
  schedule:
    - cron: '17 20 * * *'

jobs:
  doctor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run HealthLens doctor
        env:
          HEALTHLENS_APP_URL: https://health-lens-rust.vercel.app
          HEALTHLENS_SYNC_ENDPOINT: https://health-lens-rust.vercel.app/api/sync/health-connect
          HEALTHLENS_ADMIN_ENDPOINT: https://health-lens-rust.vercel.app/api/admin/self-test
          HEALTHLENS_SYNC_SECRET: ${{ secrets.HEALTHLENS_SYNC_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run doctor -- --sync --cleanup
